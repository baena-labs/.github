# Canonical baena-labs label set. Source of truth for all org repos.
#
# Synced by `.github/workflows/reusable-sync-labels.yml`. Sync is ADDITIVE:
# repo-specific labels (e.g. legacy `area: brain` in legal-brain) are NOT
# deleted. Edit colors/descriptions here and the next sync propagates them.
#
# Naming convention: slash-style families — `priority/`, `type/`, `area/`,
# `status/`. Decision per baena-labs/org-config#16. Domain-specific labels
# (e.g. `area/cases` for legal-brain) stay per-repo and are NOT added here.
#
# This file currently ships only the priority family. Type / status / area
# label families will be added as their taxonomies are decided in
# baena-labs/org-config#16.

# --- Priority ----------------------------------------------------------------
# Required on every issue/PR (will be enforced by an org ruleset — see
# baena-labs/org-config#16).
- name: priority/p0
  color: b60205
  description: Critical / blocker / outage — respond in hours
- name: priority/p1
  color: d93f0b
  description: High / next sprint — days
- name: priority/p2
  color: fbca04
  description: Normal / planned — weeks
- name: priority/p3
  color: cccccc
  description: Low / nice-to-have / backlog — whenever
