name: Reusable — Sync labels

# Applies the canonical baena-labs label set to the calling repo additively
# (creates missing labels, updates color/description on existing matches,
# does NOT delete any labels). Domain-specific labels in the calling repo
# survive untouched.
#
# Source of truth is hardcoded to `baena-labs/.github/labels.yml`. The ref
# tracks `github.job_workflow_sha` so when a caller pins this workflow with
# `uses: baena-labs/.github/.../reusable-sync-labels.yml@<sha>`, the labels
# data is read from the same SHA — no drift between pinned workflow and
# floating labels file. Falls back to `main` for local-path callers where
# `job_workflow_sha` is empty.

on:
  workflow_call: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Fetch canonical labels file
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.job_workflow_sha || 'main' }}
        run: |
          gh api "repos/baena-labs/.github/contents/labels.yml?ref=$REF" \
            -H "Accept: application/vnd.github.raw" \
            > labels.yml
          # Log only the size, not the content — the latter would echo the
          # full taxonomy into Actions logs which are world-readable on
          # public repos.
          echo "Fetched labels.yml from baena-labs/.github@$REF ($(wc -c < labels.yml) bytes)."

      - name: Apply labels
        env:
          GH_TOKEN: ${{ github.token }}
          # The reusable runs without a checkout, so `gh` has no git remote
          # to infer the target repo from. Tell it explicitly.
          GH_REPO: ${{ github.repository }}
        run: |
          # yq is preinstalled on ubuntu-latest runners (mikefarah/yq).
          yq -o=json '.' labels.yml | jq -c '.[]' | while read -r label; do
            name=$(jq -r '.name' <<< "$label")
            color=$(jq -r '.color' <<< "$label")
            description=$(jq -r '.description // ""' <<< "$label")
            echo "::group::Upsert label: $name"
            # `gh label create --force` upserts: creates if missing,
            # updates color/description if it already exists.
            gh label create "$name" \
              --color "$color" \
              --description "$description" \
              --force
            echo "::endgroup::"
          done
          echo "Sync complete (additive — no labels were deleted)."
