name: Reusable — Test

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version for tests"
        required: false
        type: string
        default: "20"
      test-command:
        description: "Test command to run"
        required: false
        type: string
        default: "npm test"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - run: npm ci

      - run: ${{ inputs.test-command }}
